  .hero{

    color:#facc15;
    font-size:13px;

  .logo{

    line-height:.95;
    font-weight:900;
    text-transform:uppercase;
    background:linear-gradient(180deg,#fff4bf,#facc15,#b77900);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:22px;
  }

  .headline{
    font-size:30px;
    line-height:1.15;

    padding:20px 16px;

    font-size:20px;
    font-weight:900;
    text-transform:uppercase;

    display:flex;

    background:linear-gradient(180deg,#35e06f,#25D366,#128C7E);
    color:#fff;
    text-decoration:none;
    padding:17px 16px;
    border-radius:999px;
    font-size:17px;
    font-weight:900;

  .cta-whatsapp .whatsapp-icon{

  @keyframes pulse{

        FICOU COM DÚVIDA? ME CHAMA NO WHATSAPP
      </a>

    </section>
  </main>

<script>
(function() {
  const urlParams = new URLSearchParams(window.location.search);
  const src = urlParams.get('src');

  if (src) {
    const links = document.querySelectorAll('a[href*="aguiaprime119000.com"]');

    links.forEach(link => {
      let currentHref = link.getAttribute('href');

      if (currentHref.includes('?')) {
        link.setAttribute('href', currentHref + '&src=' + src);
      } else {
        link.setAttribute('href', currentHref + '?src=' + src);
      }
    });
  }
})();
</script>
