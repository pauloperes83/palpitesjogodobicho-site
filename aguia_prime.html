  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #030712;
      color: #fff;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background:
        radial-gradient(circle at top, #0b3b75 0%, #061527 38%, #030712 78%),
        linear-gradient(180deg, #061527, #030712);
    }

    .card {
      width: 100%;
      max-width: 460px;
      text-align: center;
      padding: 28px 18px 30px;
      border-radius: 28px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(250,204,21,.35);
      box-shadow: 0 0 40px rgba(0,0,0,.35);
    }

    .top-badge {
      display: inline-block;
      padding: 9px 16px;
      border: 1px solid rgba(250,204,21,.55);
      border-radius: 999px;
      color: #facc15;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .8px;
      text-transform: uppercase;
      background: rgba(0,0,0,.35);
      margin-bottom: 22px;
    }

    .logo {
      font-size: 54px;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 14px rgba(250,204,21,.55));
    }

    .brand {
      font-size: 48px;
      line-height: .92;
      font-weight: 900;
      text-transform: uppercase;
      background: linear-gradient(180deg, #fff4bf, #facc15, #b77900);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 18px;
      text-shadow: 0 0 18px rgba(250,204,21,.4);
    }

    .description {
      font-size: 20px;
      line-height: 1.45;
      color: #e5e7eb;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .buttons {
      display: grid;
      gap: 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      text-decoration: none;
      padding: 18px 16px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .25s ease;
    }

    .btn:hover {
      transform: scale(1.035);
    }

    .btn-gold {
      background: linear-gradient(180deg, #fff1a8, #facc15, #d97706);
      color: #050505;
      box-shadow: 0 0 32px rgba(250,204,21,.65);
      animation: pulseGold 1.45s infinite;
    }

    .btn-whatsapp {
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: #fff;
      box-shadow: 0 0 30px rgba(37,211,102,.55);
    }

    .btn-whatsapp svg {
      width: 26px;
      height: 26px;
      fill: currentColor;
      flex: none;
    }

    .warning {
      margin-top: 22px;
      font-size: 12px;
      line-height: 1.45;
      color: #cbd5e1;
      opacity: .9;
    }

    @keyframes pulseGold {
      0% {
        transform: scale(1);
        box-shadow: 0 0 24px rgba(250,204,21,.55);
      }
      50% {
        transform: scale(1.04);
        box-shadow: 0 0 44px rgba(250,204,21,.9);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 24px rgba(250,204,21,.55);
      }
    }

    @media(max-width:420px) {
      .brand {
        font-size: 42px;
      }

      .description {
        font-size: 18px;
      }

      .btn {
        font-size: 16px;
        padding: 16px 14px;
      }
    }
  </style>
